<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=1080"/>
  <title>Promo Instagram — StudioWeb Maroc</title>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{width:1080px;height:1080px;overflow:hidden;font-family:'Manrope',sans-serif;-webkit-font-smoothing:antialiased;}

    @keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:none}}
    @keyframes badgePulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.6)}60%{box-shadow:0 0 0 16px rgba(239,68,68,0)}}
    @keyframes shimmerBtn{0%{background-position:-300% center}100%{background-position:300% center}}
    @keyframes priceGlow{0%,100%{text-shadow:0 0 50px rgba(252,211,77,.5),0 0 100px rgba(252,211,77,.25)}50%{text-shadow:0 0 80px rgba(252,211,77,.9),0 0 160px rgba(252,211,77,.45)}}
    @keyframes borderSpin{to{--a:360deg}}
    @keyframes particleDrift{0%{transform:translateY(0);opacity:.6}100%{transform:translateY(-140px);opacity:0}}
    @property --a{syntax:'<angle>';initial-value:0deg;inherits:false}
    @media(prefers-reduced-motion:reduce){*{animation:none!important}}

    .canvas{width:1080px;height:1080px;position:relative;overflow:hidden;background:#050A14;}

    /* === PHOTO SECTION (top 420px) === */
    .photo-wrap{position:absolute;top:0;left:0;right:0;height:430px;overflow:hidden;}
    .photo-img{width:100%;height:100%;object-fit:cover;object-position:center 40%;display:block;}
    /* Layered overlay: dark brand color */
    .photo-overlay{position:absolute;inset:0;background:linear-gradient(180deg,rgba(5,10,20,.55) 0%,rgba(5,10,20,.72) 60%,rgba(5,10,20,1) 100%);}
    /* Subtle blue tint for brand harmony */
    .photo-tint{position:absolute;inset:0;background:rgba(3,105,161,.18);}

    /* === DARK BOTTOM SECTION === */
    .dark-section{position:absolute;bottom:0;left:0;right:0;height:680px;background:#050A14;}

    /* Grid & noise */
    .grid{position:absolute;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,.05) 1px,transparent 0);background-size:36px 36px;z-index:1;}
    .noise{position:absolute;inset:0;opacity:.04;z-index:1;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:256px;}

    /* Glows */
    .glow-price{position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(252,211,77,.12) 0%,transparent 60%);top:330px;left:50%;transform:translateX(-50%);z-index:1;}
    .glow-bot{position:absolute;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(239,68,68,.12) 0%,transparent 60%);bottom:-100px;right:-50px;z-index:1;}

    /* Particles */
    .particles{position:absolute;bottom:0;left:0;right:0;height:500px;z-index:2;pointer-events:none;}
    .p{position:absolute;border-radius:50%;animation:particleDrift linear infinite;}
    .p:nth-child(1){width:4px;height:4px;background:#FCD34D;left:8%;bottom:40px;animation-duration:6s;}
    .p:nth-child(2){width:3px;height:3px;background:#38BDF8;left:20%;bottom:60px;animation-duration:8s;animation-delay:1s;}
    .p:nth-child(3){width:5px;height:5px;background:#FCD34D;left:75%;bottom:30px;animation-duration:7s;animation-delay:.5s;}
    .p:nth-child(4){width:2px;height:2px;background:#10B981;left:85%;bottom:50px;animation-duration:9s;animation-delay:2s;}
    .p:nth-child(5){width:3px;height:3px;background:#EF4444;left:50%;bottom:20px;animation-duration:6.5s;animation-delay:1.5s;}

    /* Content */
    .content{position:absolute;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:58px 76px 62px;}

    /* Top row */
    .top{display:flex;align-items:center;justify-content:space-between;width:100%;animation:fadeUp .5s cubic-bezier(.16,1,.3,1) .1s both;}
    .logo{display:flex;align-items:center;gap:13px;font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:27px;color:#fff;}
    .logo-box{width:48px;height:48px;background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.25);border-radius:13px;display:grid;place-items:center;backdrop-filter:blur(12px);}
    .logo-box svg{width:22px;height:22px;color:#fff;}
    .logo span{color:#38BDF8;}
    .badge-offre{background:#EF4444;border-radius:100px;padding:10px 24px;font-size:15px;font-weight:800;color:#fff;letter-spacing:.5px;text-transform:uppercase;animation:badgePulse 2.5s ease-in-out infinite,fadeUp .5s cubic-bezier(.16,1,.3,1) .1s both;}

    /* Photo headline (over photo area) */
    .photo-headline{
      display:flex;flex-direction:column;align-items:center;
      animation:fadeUp .6s cubic-bezier(.16,1,.3,1) .2s both;
      margin-top:-20px;
    }
    .ph-eyebrow{font-size:16px;font-weight:700;color:rgba(255,255,255,.6);letter-spacing:3px;text-transform:uppercase;margin-bottom:12px;}
    .ph-title{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:52px;line-height:1;letter-spacing:-1.5px;color:#fff;text-align:center;text-shadow:0 4px 24px rgba(0,0,0,.5);}

    /* Price */
    .price-wrap{
      position:relative;border-radius:28px;padding:3px;width:88%;
      background:conic-gradient(from var(--a),rgba(252,211,77,0),rgba(252,211,77,.9),rgba(252,211,77,0));
      animation:borderSpin 3.5s linear infinite,fadeUp .6s cubic-bezier(.16,1,.3,1) .3s both;
    }
    .price-inner{background:rgba(5,10,20,.92);border-radius:26px;padding:28px 0;display:flex;flex-direction:column;align-items:center;position:relative;overflow:hidden;backdrop-filter:blur(12px);}
    .price-inner::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center,rgba(252,211,77,.06) 0%,transparent 65%);}
    .p-from{font-size:16px;font-weight:700;color:rgba(252,211,77,.65);letter-spacing:2px;text-transform:uppercase;margin-bottom:2px;position:relative;z-index:1;}
    .p-num{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:150px;line-height:.88;letter-spacing:-8px;color:#FCD34D;animation:priceGlow 3s ease-in-out infinite;position:relative;z-index:1;}
    .p-cur{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:42px;color:rgba(252,211,77,.75);letter-spacing:3px;margin-top:4px;position:relative;z-index:1;}

    /* Guarantees */
    .gs{display:flex;gap:14px;width:100%;animation:fadeUp .5s cubic-bezier(.16,1,.3,1) .45s both;}
    .g{flex:1;display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:13px 16px;}
    .g-dot{width:8px;height:8px;border-radius:50%;background:#10B981;box-shadow:0 0 8px rgba(16,185,129,.7);flex-shrink:0;}
    .g-txt{font-size:15px;font-weight:700;color:#fff;line-height:1.3;}

    /* CTA */
    .cta-btn{
      width:100%;border-radius:18px;padding:22px;font-size:23px;font-weight:800;color:#fff;
      background:linear-gradient(90deg,#EF4444 0%,#DC2626 25%,#EF4444 50%,#DC2626 75%,#EF4444 100%);
      background-size:300% 100%;animation:shimmerBtn 3s linear infinite,fadeUp .5s cubic-bezier(.16,1,.3,1) .55s both;
      box-shadow:0 12px 40px rgba(239,68,68,.55);
      display:flex;align-items:center;justify-content:center;gap:12px;
    }
    .cta-btn svg{width:22px;height:22px;}
    .contact-line{font-size:15px;color:rgba(255,255,255,.35);font-weight:500;animation:fadeUp .5s cubic-bezier(.16,1,.3,1) .62s both;}
  </style>
</head>
<body>
<div class="canvas">
  <!-- PHOTO BACKGROUND (top) -->
  <div class="photo-wrap">
    <img class="photo-img" crossorigin="anonymous"
      src="https://images.unsplash.com/photo-1531297484001-80022131f5a1?auto=format&fit=crop&w=1080&h=430&q=85"
      alt="Workspace laptop élégant"/>
    <div class="photo-overlay"></div>
    <div class="photo-tint"></div>
  </div>

  <!-- DARK BOTTOM -->
  <div class="dark-section"></div>

  <!-- Overlays -->
  <div class="grid"></div>
  <div class="noise"></div>
  <div class="glow-price"></div>
  <div class="glow-bot"></div>
  <div class="particles">
    <div class="p"></div><div class="p"></div><div class="p"></div>
    <div class="p"></div><div class="p"></div>
  </div>

  <!-- CONTENT -->
  <div class="content">
    <div class="top">
      <div class="logo">
        <div class="logo-box"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg></div>
        Studio<span>Web</span>
      </div>
      <div class="badge-offre">🔥 Offre Limitée</div>
    </div>

    <div class="photo-headline">
      <div class="ph-eyebrow">Création de site web · Maroc</div>
      <div class="ph-title">Site Professionnel<br/>Clé en Main</div>
    </div>

    <div class="price-wrap">
      <div class="price-inner">
        <div class="p-from">À partir de</div>
        <div class="p-num">1 990</div>
        <div class="p-cur">MAD</div>
      </div>
    </div>

    <div class="gs">
      <div class="g"><div class="g-dot"></div><div class="g-txt">Livraison<br/>14 jours</div></div>
      <div class="g"><div class="g-dot"></div><div class="g-txt">SEO Google<br/>inclus</div></div>
      <div class="g"><div class="g-dot"></div><div class="g-txt">Paiement<br/>3× sans frais</div></div>
    </div>

    <div class="cta-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 014.07 13.6 19.79 19.79 0 011 4.93 2 2 0 012.84 3h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L7.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
      Devis Gratuit Sous 24h
    </div>
    <div class="contact-line">+212 6 60 76 13 13 · designstudioweb@icloud.com · @studioweb</div>
  </div>
</div>

<div id="dl-ui" style="position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;align-items:flex-end;gap:8px;">
  <div id="dl-tip" style="background:rgba(15,23,42,.9);color:#fff;font-family:Manrope,sans-serif;font-size:13px;padding:7px 14px;border-radius:8px;display:none;">✓ PNG téléchargé !</div>
  <button id="dl-btn" onclick="downloadPNG()" style="background:#EF4444;color:#fff;border:none;border-radius:14px;padding:14px 28px;font-size:15px;font-weight:700;cursor:pointer;font-family:Manrope,sans-serif;box-shadow:0 8px 28px rgba(239,68,68,.5);display:flex;align-items:center;gap:8px;">
    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    Télécharger PNG
  </button>
</div>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<script>
async function downloadPNG(){
  const btn=document.getElementById('dl-btn');btn.textContent='⟳ Export…';btn.disabled=true;
  const c=await html2canvas(document.querySelector('.canvas'),{scale:2,useCORS:true,allowTaint:false,backgroundColor:null});
  const a=document.createElement('a');a.download='studioweb-promo-instagram.png';a.href=c.toDataURL('image/png');a.click();
  btn.innerHTML='<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Télécharger PNG';
  btn.disabled=false;
  const t=document.getElementById('dl-tip');t.style.display='block';setTimeout(()=>t.style.display='none',2500);
}
</script>
</body>
</html>
