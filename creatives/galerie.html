<!DOCTYPE html>
<html lang="fr" class="scroll-smooth">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Galerie Créatives — StudioWeb Maroc</title>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Manrope',sans-serif;background:#F8FAFC;-webkit-font-smoothing:antialiased;}
    h1,h2,h3{font-family:'Bricolage Grotesque',sans-serif;}

    .preview-wrap{
      width:100%;overflow:hidden;position:relative;
      background:#1e293b;border-radius:12px 12px 0 0;
    }
    .preview-wrap iframe{
      border:none;transform-origin:top left;display:block;
    }

    @keyframes spin{to{transform:rotate(360deg)}}
    .spinner{animation:spin .8s linear infinite;display:inline-block;}

    .card{
      background:#fff;border-radius:16px;border:1px solid #E2E8F0;
      box-shadow:0 1px 2px rgba(15,23,42,.04),0 8px 24px rgba(15,23,42,.06);
      overflow:hidden;transition:box-shadow .2s,transform .2s;
    }
    .card:hover{box-shadow:0 4px 8px rgba(15,23,42,.06),0 20px 48px rgba(15,23,42,.1);transform:translateY(-2px);}

    .dl-btn{
      width:100%;background:#EF4444;color:#fff;border:none;border-radius:12px;
      padding:12px 0;font-size:15px;font-weight:700;cursor:pointer;
      font-family:'Manrope',sans-serif;
      box-shadow:0 6px 20px rgba(239,68,68,.35);
      transition:background .15s;
      display:flex;align-items:center;justify-content:center;gap:8px;
    }
    .dl-btn:hover{background:#DC2626;}
    .dl-btn:disabled{opacity:.7;cursor:wait;}
    .open-btn{
      flex:1;background:#F1F5F9;color:#334155;border:1px solid #E2E8F0;
      border-radius:12px;padding:12px 0;font-size:14px;font-weight:600;
      cursor:pointer;font-family:'Manrope',sans-serif;transition:background .15s;
    }
    .open-btn:hover{background:#E2E8F0;}
  </style>
</head>
<body>

<header class="border-b border-slate-200 bg-white px-6 py-4 flex items-center justify-between">
  <div class="flex items-center gap-3">
    <div class="h-9 w-9 rounded-xl bg-slate-900 grid place-items-center">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="white" stroke-width="2.5"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
    </div>
    <span style="font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:20px;color:#0F172A;">Studio<span style="color:#0369A1;">Web</span> <span style="color:#94A3B8;font-size:14px;font-weight:600;">Maroc</span></span>
  </div>
  <div class="text-sm text-slate-500 font-medium">Galerie · <span id="totalCount"></span> créatives</div>
</header>

<main class="mx-auto max-w-7xl px-6 py-10">
  <div class="mb-8">
    <h1 class="text-3xl font-extrabold text-slate-900">Mes Créatives</h1>
    <p class="mt-2 text-slate-500">Cliquez sur <strong>Télécharger PNG</strong> pour exporter chaque visuel en haute résolution.</p>
  </div>

  <!-- Filter tabs -->
  <div class="mb-8 flex flex-wrap gap-2" id="tabs">
    <button onclick="filter('all')" class="tab-btn active rounded-full bg-slate-900 px-4 py-2 text-sm font-semibold text-white">Tous</button>
    <button onclick="filter('promo')" class="tab-btn rounded-full border border-slate-200 bg-white px-4 py-2 text-sm font-semibold text-slate-600 hover:bg-slate-50">Promotionnel</button>
    <button onclick="filter('niche')" class="tab-btn rounded-full border border-slate-200 bg-white px-4 py-2 text-sm font-semibold text-slate-600 hover:bg-slate-50">Niche</button>
    <button onclick="filter('instagram')" class="tab-btn rounded-full border border-slate-200 bg-white px-4 py-2 text-sm font-semibold text-slate-600 hover:bg-slate-50">Instagram</button>
    <button onclick="filter('facebook')" class="tab-btn rounded-full border border-slate-200 bg-white px-4 py-2 text-sm font-semibold text-slate-600 hover:bg-slate-50">Facebook</button>
    <button onclick="filter('story')" class="tab-btn rounded-full border border-slate-200 bg-white px-4 py-2 text-sm font-semibold text-slate-600 hover:bg-slate-50">Story</button>
    <button onclick="filter('linkedin')" class="tab-btn rounded-full border border-slate-200 bg-white px-4 py-2 text-sm font-semibold text-slate-600 hover:bg-slate-50">LinkedIn</button>
    <button onclick="filter('whatsapp')" class="tab-btn rounded-full border border-slate-200 bg-white px-4 py-2 text-sm font-semibold text-slate-600 hover:bg-slate-50">WhatsApp</button>
  </div>

  <div id="grid" class="grid gap-6 grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4"></div>
</main>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

  'WhatsApp':'M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347zM12 0C5.373 0 0 5.373 0 12c0 2.127.558 4.126 1.532 5.859L.057 23.882a.5.5 0 00.61.61l6.023-1.475A11.93 11.93 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.959 0-3.796-.5-5.4-1.382l-.389-.219-4.032.988.988-3.91-.238-.4A9.955 9.955 0 012 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z',

  'Story':'M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z',

let activeFilter = 'all';
const PREVIEW_H = 220;

function buildCard(c, idx) {
  const ratio = c.w / c.h;
  const previewW = Math.round(PREVIEW_H * ratio);
  const scaleX = previewW / c.w;
  const scaleY = PREVIEW_H / c.h;
  const scale = Math.min(scaleX, scaleY);
  const scaledW = Math.round(c.w * scale);
  const scaledH = Math.round(c.h * scale);

  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.tags = c.tags.join(',');

  const iconPath = PLATFORM_ICONS[c.platform] || PLATFORM_ICONS['Instagram'];

  card.innerHTML = `
    <div class="preview-wrap" style="height:${PREVIEW_H}px;">
      <div style="width:100%;height:${PREVIEW_H}px;display:flex;align-items:center;justify-content:center;background:#1e293b;overflow:hidden;">
        <iframe
          id="iframe-${idx}"
          src="${c.file}"
          scrolling="no"
          style="width:${c.w}px;height:${c.h}px;transform:scale(${scale});transform-origin:top left;border:none;pointer-events:none;flex-shrink:0;"
        ></iframe>
      </div>
    </div>
    <div style="padding:16px;display:flex;flex-direction:column;gap:12px;">
      <div style="display:flex;align-items:center;justify-content:space-between;">
        <div>
          <div style="font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:15px;color:#0F172A;">${c.name}</div>
          <div style="font-size:12px;color:#94A3B8;margin-top:2px;">${c.w} × ${c.h} px</div>
        </div>
        <div style="display:flex;align-items:center;gap:6px;background:${c.color}18;border-radius:100px;padding:5px 11px;">
          <svg viewBox="0 0 24 24" width="13" height="13" fill="${c.color}"><path d="${iconPath}"/></svg>
          <span style="font-size:12px;font-weight:700;color:${c.color};">${c.platform}</span>
        </div>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="open-btn" onclick="window.open('${c.file}','_blank')">Ouvrir</button>
        <button class="dl-btn" id="dl-${idx}" onclick="downloadCard(${idx})">
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Télécharger PNG
        </button>
      </div>
    </div>
  `;
  return card;
}

async function downloadCard(idx) {
  const c = CREATIVES[idx];
  const btn = document.getElementById('dl-' + idx);
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner">⟳</span> Export…';

  try {
    const iframe = document.getElementById('iframe-' + idx);
    const iframeWin = iframe.contentWindow;
    const iframeDoc = iframe.contentDocument || iframeWin.document;

    // Load html2canvas in iframe if not already loaded
    await new Promise((resolve, reject) => {
      if (iframeWin.html2canvas) { resolve(); return; }
      const s = iframeDoc.createElement('script');
      s.src = 'https://html2canvas.hertzen.com/dist/html2canvas.min.js';
      s.onload = resolve;
      s.onerror = reject;
      iframeDoc.head.appendChild(s);
    });

    const canvas = iframeDoc.querySelector('.canvas');
    const rendered = await iframeWin.html2canvas(canvas, {
      scale: 2,
      useCORS: true,
      allowTaint: true,
      backgroundColor: null,
      width: c.w,
      height: c.h,
      windowWidth: c.w,
      windowHeight: c.h,
    });

    const link = document.createElement('a');
    link.download = 'studioweb-' + c.file.replace('.html', '') + '.png';
    link.href = rendered.toDataURL('image/png');
    link.click();

    btn.innerHTML = '✓ Téléchargé !';
    btn.style.background = '#10B981';
    setTimeout(() => {
      btn.innerHTML = '<svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Télécharger PNG';
      btn.style.background = '';
      btn.disabled = false;
    }, 2000);
  } catch(e) {
    console.error(e);
    btn.innerHTML = '⚠ Erreur — Ouvrir le fichier';
    btn.style.background = '#F59E0B';
    btn.disabled = false;
    // Fallback: open in new tab
    setTimeout(() => window.open(c.file, '_blank'), 500);
  }
}

function filter(tag) {
  activeFilter = tag;
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.remove('bg-slate-900','text-white');
    b.classList.add('bg-white','text-slate-600','border','border-slate-200');
  });
  event.target.classList.add('bg-slate-900','text-white');
  event.target.classList.remove('bg-white','text-slate-600','border','border-slate-200');

  document.querySelectorAll('#grid > div').forEach(card => {
    const tags = card.dataset.tags.split(',');
    card.style.display = (tag === 'all' || tags.includes(tag)) ? '' : 'none';
  });
}

function init() {
  const grid = document.getElementById('grid');
  document.getElementById('totalCount').textContent = CREATIVES.length;
  CREATIVES.forEach((c, i) => grid.appendChild(buildCard(c, i)));
}

init();
</script>
</body>
</html>
